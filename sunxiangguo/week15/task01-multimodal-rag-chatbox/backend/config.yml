# API配置
api:
  host: 0.0.0.0
  port: 8000
  debug: true

# 大模型配置
llm:
  provider: dashscope
  api_key: sk-be4235589ac240b099ce67bc1af07581
  api_base: https://dashscope.aliyuncs.com/api/v1/services/aigc/text-generation/generation
  model: qwen-turbo
  max_tokens: 2048
  temperature: 0.7

# 多模态模型配置
multimodal:
  provider: dashscope
  api_key: sk-be4235589ac240b099ce67bc1af07581
  api_base: https://dashscope.aliyuncs.com/api/v1/services/aigc/multimodal-generation/generation
  model: qwen-vl-plus
  max_tokens: 2048
  temperature: 0.7

# 向量模型配置
embedding:
  provider: dashscope
  api_key: sk-be4235589ac240b099ce67bc1af07581
  api_base: https://dashscope.aliyuncs.com/api/v1/services/embeddings/text-embedding/text-embedding
  model: text-embedding-v1
  dimension: 1024

# PDF解析配置
pdf_parser:
  enabled: true
  use_ocr: false

# 存储配置
storage:
  type: local
  local_path: ./data
