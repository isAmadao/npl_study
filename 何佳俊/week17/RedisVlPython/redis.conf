# ============================================================
# Redis 配置文件 — RedisVL Agent Cache
# ============================================================
# 兼容 Redis 6.x / 7.x
# 无需 Redis Stack 模块（不依赖 RediSearch）
# ============================================================

# 绑定地址
bind 0.0.0.0

# 保护模式（生产环境建议开启密码）
protected-mode yes

# 端口
port 6379

# 持久化 —— RDB
save 900 1       # 900 秒内至少 1 个 key 变化
save 300 10      # 300 秒内至少 10 个 key 变化
save 60 10000    # 60 秒内至少 10000 个 key 变化

# 持久化 —— AOF（推荐，数据更安全）
appendonly yes
appendfsync everysec

# 内存管理 —— LRU 淘汰策略
maxmemory 512mb
maxmemory-policy allkeys-lru

# 慢查询日志
slowlog-log-slower-than 10000
slowlog-max-len 128

# 最大连接数
maxclients 1000

# 超时设置
timeout 300
tcp-keepalive 60
